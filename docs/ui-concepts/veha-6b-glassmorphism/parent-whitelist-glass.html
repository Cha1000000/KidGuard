<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidGuard Whitelist - Glassmorphism</title>
    <style>
        :root {
            --bg-top: #121217;
            --bg-bottom: #050505;
            --accent: #4FC3B0;
            --accent-glow: rgba(79, 195, 176, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --success: #4CAF50;
        }

        body {
            margin: 0;
            background: #111;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .phone-frame {
            width: 360px;
            height: 740px;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            border-radius: 44px;
            border: 8px solid #222;
            position: relative;
            overflow: hidden;
            padding: 24px;
            box-sizing: border-box;
        }

        .header {
            margin-top: 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }

        .search-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .search-bar svg {
            width: 18px;
            height: 18px;
            fill: var(--text-secondary);
        }

        .section-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            padding-left: 4px;
        }

        .app-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .app-item {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: 0.3s;
        }

        .app-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-icon svg {
            width: 24px;
            height: 24px;
            fill: var(--accent);
        }

        .app-info {
            flex: 1;
        }

        .app-name {
            font-size: 15px;
            font-weight: 500;
        }

        .app-status {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            border: 1px solid var(--glass-border);
        }

        .toggle-switch.on {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            border-color: transparent;
        }

        .toggle-thumb {
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle-switch.on .toggle-thumb {
            left: 21px;
        }

        /* Float action button effect */
        .phone-frame::after {
            content: '';
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 100px;
            height: 100px;
            background: var(--accent-glow);
            filter: blur(40px);
            opacity: 0.4;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="header">
            <div class="back-btn">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </div>
            <h1>Всегда доступные</h1>
        </div>

        <div class="search-bar">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            Поиск приложений...
        </div>

        <div class="section-label">Разрешенные</div>
        
        <div class="app-list">
            <div class="app-item">
                <div class="app-icon">
                    <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </div>
                <div class="app-info">
                    <div class="app-name">Телефон</div>
                    <div class="app-status">Системное</div>
                </div>
                <div class="toggle-switch on">
                    <div class="toggle-thumb"></div>
                </div>
            </div>

            <div class="app-item">
                <div class="app-icon">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 11H7V9h2v2zm4 0h-2V9h2v2zm4 0h-2V9h2v2z"/></svg>
                </div>
                <div class="app-info">
                    <div class="app-name">Сообщения</div>
                    <div class="app-status">Системное</div>
                </div>
                <div class="toggle-switch on">
                    <div class="toggle-thumb"></div>
                </div>
            </div>

            <div class="app-item">
                <div class="app-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                </div>
                <div class="app-info">
                    <div class="app-name">Карты</div>
                    <div class="app-status">Google LLC</div>
                </div>
                <div class="toggle-switch on">
                    <div class="toggle-thumb"></div>
                </div>
            </div>
        </div>

        <div class="section-label" style="margin-top: 32px;">Другие</div>

        <div class="app-list">
            <div class="app-item" style="opacity: 0.7;">
                <div class="app-icon">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                </div>
                <div class="app-info">
                    <div class="app-name">ShareMe</div>
                    <div class="app-status">Xiaomi Inc.</div>
                </div>
                <div class="toggle-switch">
                    <div class="toggle-thumb"></div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
