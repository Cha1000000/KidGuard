<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidGuard Glassmorphism Mockup</title>
    <style>
        :root {
            --bg-top: #121217;
            --bg-bottom: #050505;
            --accent: #A394FF;
            --accent-glow: rgba(163, 148, 255, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            background: #222;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .phone-frame {
            width: 360px;
            height: 740px;
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            border-radius: 40px;
            border: 8px solid #333;
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            padding: 20px;
            box-sizing: border-box;
        }

        .phone-frame::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            background: var(--accent-glow);
            filter: blur(80px);
            z-index: 0;
        }

        .header {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            font-weight: 600;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .child-selector {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 5px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .child-selector img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #444;
        }

        .progress-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .progress-ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 65%, rgba(163, 148, 255, 0.05) 70%);
            border: 2px solid rgba(163, 148, 255, 0.1);
            position: relative;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top: 4px solid var(--accent);
            border-right: 4px solid var(--accent);
            transform: rotate(-45deg);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .progress-content {
            position: absolute;
            text-align: center;
        }

        .progress-content .label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .progress-content .time {
            font-size: 36px;
            font-weight: 700;
            margin: 0;
        }

        .bonus-section {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            z-index: 1;
            position: relative;
        }

        .bonus-btn {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 18px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .bonus-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
        }

        .bonus-btn .val {
            font-size: 18px;
            font-weight: 600;
            display: block;
        }

        .bonus-btn .unit {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .app-list {
            position: relative;
            z-index: 1;
        }

        .app-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .app-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .app-info {
            flex: 1;
        }

        .app-info .name {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .app-info .usage-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            width: 100%;
            overflow: hidden;
        }

        .app-info .usage-fill {
            height: 100%;
            background: var(--accent);
            width: 40%;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .navbar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            height: 60px;
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }

        .nav-item {
            color: var(--text-secondary);
            font-size: 20px;
        }

        .nav-item.active {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="header">
            <h1>KidGuard</h1>
            <div class="child-selector">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar">
                <span>Володя</span>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-ring">
                <div class="progress-fill"></div>
            </div>
            <div class="progress-content">
                <div class="label">Осталось</div>
                <div class="time">01:20:00</div>
                <div style="font-size: 12px; color: var(--text-secondary);">из 2ч 00м</div>
            </div>
        </div>

        <div class="bonus-section">
            <div class="bonus-btn">
                <span class="val">+15</span>
                <span class="unit">минут</span>
            </div>
            <div class="bonus-btn">
                <span class="val">+30</span>
                <span class="unit">минут</span>
            </div>
            <div class="bonus-btn" style="background: var(--accent); color: #000; border: none;">
                <span class="val">★</span>
                <span class="unit">Бонус</span>
            </div>
        </div>

        <div class="app-list">
            <div class="app-card">
                <div class="app-icon">📺</div>
                <div class="app-info">
                    <div class="name">YouTube</div>
                    <div class="usage-bar">
                        <div class="usage-fill" style="width: 75%;"></div>
                    </div>
                </div>
            </div>
            <div class="app-card">
                <div class="app-icon">🎮</div>
                <div class="app-info">
                    <div class="name">Roblox</div>
                    <div class="usage-bar">
                        <div class="usage-fill" style="width: 30%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="navbar">
            <div class="nav-item active">🏠</div>
            <div class="nav-item">📊</div>
            <div class="nav-item">⚙️</div>
        </div>
    </div>

</body>
</html>
