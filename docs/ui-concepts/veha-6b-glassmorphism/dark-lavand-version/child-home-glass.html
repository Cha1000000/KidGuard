<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidGuard Child Home - Glassmorphism</title>
    <style>
        :root {
            --bg-top: #0F0C29;
            --bg-bottom: #000000;
            --accent: #A394FF;
            --accent-glow: rgba(163, 148, 255, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            background: #111;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .phone-frame {
            width: 360px;
            height: 740px;
            background: radial-gradient(circle at top right, #1a1a2e 0%, #000 100%);
            border-radius: 44px;
            border: 8px solid #222;
            position: relative;
            overflow: hidden;
            padding: 24px;
            box-sizing: border-box;
        }

        /* Ambient light effects */
        .phone-frame::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: var(--accent-glow);
            filter: blur(100px);
            opacity: 0.5;
        }

        .greeting {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .avatar-glow {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .greeting-text h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 500;
        }

        .greeting-text p {
            margin: 4px 0 0;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .main-timer {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .timer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(var(--accent) 0deg 270deg, rgba(255,255,255,0.05) 270deg 360deg);
            mask: radial-gradient(transparent 62%, black 63%);
            -webkit-mask: radial-gradient(transparent 62%, black 63%);
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }

        .timer-time {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .timer-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .status-badge {
            background: var(--accent);
            color: #000;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .rules-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .rule-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .icon-box {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-box svg {
            width: 18px;
            height: 18px;
            fill: var(--accent);
        }

        .rule-card .title {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .rule-card .value {
            font-size: 16px;
            font-weight: 600;
        }

        .footer-shield {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 12px;
            background: var(--glass-bg);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .footer-shield svg {
            width: 14px;
            height: 14px;
            fill: var(--text-secondary);
        }

    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="greeting">
            <div class="avatar-glow">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" width="64" alt="avatar">
            </div>
            <div class="greeting-text">
                <h2>Привет, Володя!</h2>
                <p>Все правила соблюдаются</p>
            </div>
        </div>

        <div class="main-timer">
            <div class="timer-ring"></div>
            <div class="timer-label">Осталось времени</div>
            <div class="timer-time">01:45</div>
            <div class="status-badge">ПОД ПРИСМОТРОМ</div>
        </div>

        <div class="rules-grid">
            <div class="rule-card">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm0 3.45l8.27 14.3H3.73L12 5.45zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/></svg>
                </div>
                <span class="title">Лимиты</span>
                <span class="value">4 приложения</span>
            </div>
            <div class="rule-card">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                </div>
                <span class="title">Запрещено</span>
                <span class="value">12 приложений</span>
            </div>
            <div class="rule-card">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                </div>
                <span class="title">Доступно</span>
                <span class="value">Всегда</span>
            </div>
            <div class="rule-card">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
                </div>
                <span class="title">Статистика</span>
                <span class="value">3ч 12м</span>
            </div>
        </div>

        <div class="footer-shield">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
            Защищено KidGuard
        </div>
    </div>

</body>
</html>
