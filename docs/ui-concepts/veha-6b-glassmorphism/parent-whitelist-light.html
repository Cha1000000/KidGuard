<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidGuard Whitelist - Light Glass</title>
    <style>
        :root {
            --bg-main: #EEF4F6;
            --accent: #2E6B7E;
            --accent-glow: rgba(46, 107, 126, 0.2);
            --glass-bg: rgba(220, 234, 239, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
            --text-main: #16232A;
            --text-secondary: #5B6B72;
            --shadow: 0 10px 30px rgba(46, 107, 126, 0.08);
        }

        body {
            margin: 0;
            background: #D8E2E6;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .phone-frame {
            width: 360px;
            height: 740px;
            background: radial-gradient(circle at top left, #FFFFFF 0%, var(--bg-main) 100%);
            border-radius: 44px;
            border: 8px solid #FFF;
            position: relative;
            overflow: hidden;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: 0 40px 80px rgba(0,0,0,0.08);
        }

        .header {
            margin-top: 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: #FFF;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--text-main);
        }

        .header h1 {
            font-size: 19px;
            font-weight: 700;
            margin: 0;
            color: var(--accent);
        }

        .search-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
            font-size: 14px;
            box-shadow: var(--shadow);
            font-weight: 500;
        }

        .search-bar svg {
            width: 18px;
            height: 18px;
            fill: var(--text-secondary);
        }

        .app-item {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 14px 16px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }

        .app-icon {
            width: 42px;
            height: 42px;
            background: #FFF;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .app-icon svg {
            width: 22px;
            height: 22px;
            fill: var(--accent);
        }

        .app-info {
            flex: 1;
        }

        .app-name {
            font-size: 15px;
            font-weight: 600;
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: rgba(46, 107, 126, 0.1);
            border-radius: 12px;
            position: relative;
        }

        .toggle-switch.on {
            background: var(--accent);
            box-shadow: 0 4px 10px var(--accent-glow);
        }

        .toggle-thumb {
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 3px;
            transition: 0.2s;
        }

        .toggle-switch.on .toggle-thumb {
            left: 23px;
        }

    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="header">
            <div class="back-btn">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </div>
            <h1>Всегда доступны</h1>
        </div>

        <div class="search-bar">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            Поиск приложений...
        </div>

        <div class="app-item">
            <div class="app-icon">
                <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            </div>
            <div class="app-info">
                <div class="app-name">Телефон</div>
            </div>
            <div class="toggle-switch on">
                <div class="toggle-thumb"></div>
            </div>
        </div>

        <div class="app-item">
            <div class="app-icon">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 11H7V9h2v2zm4 0h-2V9h2v2zm4 0h-2V9h2v2z"/></svg>
            </div>
            <div class="app-info">
                <div class="app-name">Сообщения</div>
            </div>
            <div class="toggle-switch on">
                <div class="toggle-thumb"></div>
            </div>
        </div>
    </div>

</body>
</html>
