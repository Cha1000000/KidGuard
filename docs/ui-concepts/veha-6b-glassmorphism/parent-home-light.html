<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidGuard Parent Home - Light Glass</title>
    <style>
        :root {
            --bg-main: #EEF4F6;
            --accent: #2E6B7E;
            --accent-glow: rgba(46, 107, 126, 0.2);
            --accent-gold: #B07D1E;
            --glass-bg: rgba(220, 234, 239, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
            --text-main: #16232A;
            --text-secondary: #5B6B72;
            --shadow: 0 10px 30px rgba(46, 107, 126, 0.08);
        }

        body {
            margin: 0;
            background: #D8E2E6;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .phone-frame {
            width: 360px;
            height: 740px;
            background: radial-gradient(circle at top left, #FFFFFF 0%, var(--bg-main) 100%);
            border-radius: 44px;
            border: 8px solid #FFF;
            position: relative;
            overflow: hidden;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
        }

        .header {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            color: var(--accent);
            font-weight: 700;
        }

        .child-selector {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 6px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: var(--shadow);
        }

        .child-selector img {
            width: 22px;
            height: 22px;
            border-radius: 50%;
        }

        .progress-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .progress-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .progress-bg {
            fill: none;
            stroke: rgba(46, 107, 126, 0.08);
            stroke-width: 12;
        }

        .progress-bar {
            fill: none;
            stroke: var(--accent);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 628; /* 2 * PI * 100 */
            stroke-dashoffset: 200;
            filter: drop-shadow(0 0 4px var(--accent-glow));
        }

        .progress-content {
            position: absolute;
            text-align: center;
        }

        .progress-content .label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .progress-content .time {
            font-size: 40px;
            font-weight: 800;
            margin: 2px 0;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        .bonus-section {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            z-index: 1;
            position: relative;
        }

        .bonus-btn {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .bonus-btn .val {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
        }

        .app-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 24px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow);
            z-index: 1;
            position: relative;
        }

        .app-icon {
            width: 44px;
            height: 44px;
            background: #FFF;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .app-icon svg {
            width: 24px;
            height: 24px;
            fill: var(--accent);
        }

        .app-info {
            flex: 1;
        }

        .app-name {
            font-size: 15px;
            font-weight: 600;
        }

        .usage-bar {
            height: 6px;
            background: rgba(46, 107, 126, 0.1);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .usage-fill {
            height: 100%;
            background: var(--accent);
            width: 60%;
        }

        .navbar {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
            height: 64px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 40px rgba(46, 107, 126, 0.1);
            z-index: 10;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: var(--text-secondary);
        }

        .nav-item.active svg {
            fill: var(--accent);
            filter: drop-shadow(0 0 5px var(--accent-glow));
        }

    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="header">
            <h1>KidGuard</h1>
            <div class="child-selector">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar">
                <span>Володя</span>
            </div>
        </div>

        <div class="progress-container">
            <svg class="progress-svg" viewBox="0 0 220 220">
                <circle class="progress-bg" cx="110" cy="110" r="100"></circle>
                <circle class="progress-bar" cx="110" cy="110" r="100" style="stroke-dashoffset: 150;"></circle>
            </svg>
            <div class="progress-content">
                <div class="label">Осталось</div>
                <div class="time">01:20</div>
                <div style="font-size: 12px; color: var(--text-secondary); font-weight: 500;">из 2ч 00м</div>
            </div>
        </div>

        <div class="bonus-section">
            <div class="bonus-btn">
                <span class="val">+15 мин</span>
            </div>
            <div class="bonus-btn">
                <span class="val">+30 мин</span>
            </div>
            <div class="bonus-btn" style="background: var(--accent-gold); border: none;">
                <span class="val" style="color: #FFF;">★</span>
            </div>
        </div>

        <div class="app-card">
            <div class="app-icon">
                <svg viewBox="0 0 24 24"><path d="M21.58 7.19c-.23-.86-.91-1.54-1.77-1.77C18.25 5 12 5 12 5s-6.25 0-7.81.42c-.86.23-1.54.91-1.77 1.77C2 8.75 2 12 2 12s0 3.25.42 4.81c.23.86.91 1.54 1.77 1.77C5.75 19 12 19 12 19s6.25 0 7.81-.42c.86-.23 1.54-.91 1.77-1.77.42-1.56.42-4.81.42-4.81s0-3.25-.42-4.81zM10 15V9l5.2 3L10 15z"/></svg>
            </div>
            <div class="app-info">
                <div class="app-name">YouTube</div>
                <div class="usage-bar">
                    <div class="usage-fill" style="width: 75%;"></div>
                </div>
            </div>
        </div>

        <div class="app-card">
            <div class="app-icon">
                <svg viewBox="0 0 24 24"><path d="M13 13v8h8v-8h-8zM3 21h8v-8H3v8zM3 3v8h8V3H3zm13.66 2L13 11h8l-4.34-6z"/></svg>
            </div>
            <div class="app-info">
                <div class="app-name">Roblox</div>
                <div class="usage-bar">
                    <div class="usage-fill" style="width: 30%;"></div>
                </div>
            </div>
        </div>

        <div class="navbar">
            <div class="nav-item active">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
            </div>
            <div class="nav-item">
                <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.08-.73-1.69-.98l-.37-2.65A.506.506 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.12.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1s.03.65.07.97l-2.11 1.66c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.31.61.22l2.49-1c.52.39 1.08.73 1.69.98l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.22.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66z"/></svg>
            </div>
        </div>
    </div>

</body>
</html>
